<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline · SSSALTY Ecosystem</title>
    <link rel="stylesheet" href="magazine.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="editorial.js" defer></script>
</head>
<body>
    <div class="aurora-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="noise-overlay"></div>

    <nav class="top-nav">
        <a href="/">Overview</a>
        <a href="/tokens">Intelligence</a>
        <a href="/health">Vitals</a>
        <a href="/diary">History</a>
        <a href="/tasks">Queue</a>
    </nav>

    <div class="container">
        <header style="margin-bottom: 80px; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <p class="uppercase-label gsap-reveal">Production Flow v4</p>
                <h1 class="gsap-reveal" style="font-size: 72px; line-height: 0.9;">Nolea <span class="italic">Pipeline</span></h1>
            </div>
            <div id="workflow-meta" class="gsap-reveal" style="text-align: right;">
                <p class="uppercase-label" style="font-size: 10px;">n8n Engine Status</p>
                <div id="wf-status-pill" class="pill" style="margin-top: 10px;">Idle</div>
            </div>
        </header>

        <div id="niche-grid" class="bento-grid">
            <!-- Dynamically filled with Niches -->
        </div>

        <!-- Workflow Hero Section -->
        <div class="card col-12 gsap-reveal" style="margin-top: 60px; background: var(--tint-gold);">
             <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <p class="uppercase-label">Workflow Architecture</p>
                    <h2 id="wf-name" class="italic" style="font-family: var(--font-serif); font-size: 32px; margin-top: 10px;">--</h2>
                </div>
                <div style="text-align: right;">
                    <p class="uppercase-label">Total Node Depth</p>
                    <div id="wf-nodes" class="display-num" style="font-size: 48px;">--</div>
                </div>
             </div>
        </div>
    </div>

    <script>
        async function load() {
            try {
                const r = await fetch('/api/pipeline');
                const data = await r.json();
                
                // Workflow Status
                const statusPill = document.getElementById('wf-status-pill');
                const isRunning = data.execution?.running;
                statusPill.innerText = isRunning ? 'Processing Live' : 'System Idle';
                statusPill.className = isRunning ? 'pill pill--status' : 'pill';
                
                document.getElementById('wf-name').innerText = data.workflow?.name || 'Nolea Engine';
                document.getElementById('wf-nodes').innerText = data.workflow?.total || '0';

                const grid = document.getElementById('niche-grid');
                grid.innerHTML = ''; // Clear

                data.niches.forEach((n, i) => {
                    const card = document.createElement('div');
                    card.className = `card col-6 gsap-reveal ${i % 2 === 0 ? 'card--rotated' : ''}`;
                    if(n.active) card.classList.add('card--coral');

                    card.innerHTML = `
                        <div class="section-num">0${i+1}</div>
                        <p class="uppercase-label">Segment: ${n.niche}</p>
                        <h3 class="italic" style="font-family: var(--font-serif); font-size: 32px; margin: 20px 0;">${n.niche} <span style="font-size: 14px; opacity: 0.5;">(${n.total_nodes} Nodes)</span></h3>
                        
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px;">
                            ${n.products.map(p => `
                                <div style="padding: 15px; background: rgba(0,0,0,0.03); border-radius: 18px;">
                                    <p style="font-size: 18px;">${p.icon}</p>
                                    <p class="uppercase-label" style="font-size: 8px; margin-top: 8px;">${p.name}</p>
                                    <div class="pill" style="font-size: 7px; margin-top: 10px; padding: 2px 8px; background: ${p.status === 'active' ? 'var(--accent-coral)' : 'transparent'}; color: ${p.status === 'active' ? 'white' : 'inherit'};">
                                        ${p.status}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    grid.appendChild(card);
                });
                
                gsap.to(".gsap-reveal", { opacity: 1, y: 0, duration: 1, stagger: 0.05, ease: "power4.out" });
            } catch(e) { console.error(e); }
        }
        load();
        setInterval(load, 10000);
    </script>
</body>
</html>
