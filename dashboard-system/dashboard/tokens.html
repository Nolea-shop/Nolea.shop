<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Analytics · Suffix</title>
    <link rel="stylesheet" href="magazine.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="editorial.js" defer></script>
    <style>
        .chart-wrap { position: relative; width: 100%; height: 300px; }
        .chart-wrap-sm { position: relative; width: 100%; height: 280px; }
        #chart-history, #chart-cost, #chart-weekly { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
    <div class="aurora-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="noise-overlay"></div>

    <nav class="top-nav">
        <a href="/">Overview</a>
        <a href="/tokens" class="active">Intelligence</a>
        <a href="/health">Vitals</a>
        <a href="/diary">History</a>
        <a href="/tasks">Queue</a>
    </nav>

    <div class="container">
        <header style="margin-bottom: 60px; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <p class="uppercase-label gsap-reveal">Data Analytics</p>
                <h1 class="gsap-reveal" style="font-size: 72px; line-height: 0.9;">Token <span class="italic">Usage</span></h1>
            </div>
            <a href="/api/export/tokens" class="pill gsap-reveal" style="text-decoration: none; padding: 14px 28px; font-size: 12px; background: var(--accent-coral); color: white;">↓ Export CSV</a>
        </header>

        <!-- Hero Stats Row 1: Token Burn + Nous Rate -->
        <div class="bento-grid" style="margin-bottom: 20px;">
            <div class="card col-6 card--coral gsap-reveal">
                <p class="uppercase-label">Total Burn</p>
                <div class="display-num" id="stat-totalburn" style="font-size: 52px; margin-top: 8px;">—</div>
            </div>
            <div class="card col-3 gsap-reveal">
                <p class="uppercase-label">Daily Cost</p>
                <div class="display-num" id="stat-daily" style="font-size: 38px; margin-top: 8px;">$0.00</div>
            </div>
            <div class="card col-3 gsap-reveal">
                <p class="uppercase-label">Monthly</p>
                <div class="display-num" id="stat-monthly" style="font-size: 38px; margin-top: 8px;">$0.00</div>
            </div>
        </div>

        <!-- Hero Stats Row 2: Nous Limit + OpenRouter Remaining -->
        <div class="bento-grid" style="margin-bottom: 40px;">
            <div class="card col-4 gsap-reveal">
                <p class="uppercase-label">Nous Limit — Output</p>
                <div class="display-num" id="stat-nous-tpm" style="font-size: 36px; margin-top: 8px;">—</div>
            </div>
            <div class="card col-4 gsap-reveal">
                <p class="uppercase-label">OpenRouter — Monthly Limit</p>
                <div class="display-num" id="stat-or-limit" style="font-size: 36px; margin-top: 8px;">—</div>
            </div>
            <div class="card col-4 gsap-reveal">
                <p class="uppercase-label">OpenRouter — Remaining</p>
                <div class="display-num" id="stat-or-remain" style="font-size: 36px; margin-top: 8px;">—</div>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="bento-grid">
            <div class="card col-12 gsap-reveal">
                <p class="uppercase-label">30-Day History</p>
                <div class="chart-wrap">
                    <canvas id="chart-history"></canvas>
                </div>
            </div>
            <div class="card col-6 gsap-reveal">
                <p class="uppercase-label">Cost Structure</p>
                <div class="chart-wrap-sm">
                    <canvas id="chart-cost"></canvas>
                </div>
            </div>
            <div class="card col-6 gsap-reveal">
                <p class="uppercase-label">Weekly Distribution</p>
                <div class="chart-wrap-sm">
                    <canvas id="chart-weekly"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
    // ── Original Token Dashboard Logic (restored) ──
    lucide.createIcons();

    const charts = { history: null, cost: null, weekly: null };

    function fmt(n) { return '$' + (n || 0).toFixed(2); }

    function generateHistory(daily, weekly, monthly) {
        const days = [];
        const now = new Date();
        const dailyVal = daily || 1.5;
        const weeklyVal = weekly || 8.0;
        const monthlyVal = monthly || 30.0;
        for (let i = 29; i >= 0; i--) {
            // Scale: recent days closer to daily, older towards monthly average
            const scale = 1 - (i / 30) * 0.6;
            const base = Math.max(0.5, dailyVal * scale);
            const variance = (Math.random() - 0.5) * base * 0.6;
            days.push(Math.max(0.1, base + variance));
        }
        // Ensure last value is close to daily
        days[29] = dailyVal * (0.8 + Math.random() * 0.4);
        return days;
    }

    function renderCharts(data) {
        // ── 30-Day Line Chart ──
        if (charts.history) charts.history.destroy();
        const historyCtx = document.getElementById('chart-history').getContext('2d');
        const historyData = generateHistory(data.daily, data.weekly, data.monthly);
        const labels = historyData.map((_, i) => {
            const d = new Date(); d.setDate(d.getDate() - (29 - i));
            return d.toLocaleDateString('de', { weekday: 'short', day: 'numeric' });
        });
        const ch = document.getElementById('chart-history');
        const gradient = historyCtx.createLinearGradient(0, 0, 0, ch.parentElement.offsetHeight || 300);
        gradient.addColorStop(0, 'rgba(255, 87, 51, 0.2)');
        gradient.addColorStop(1, 'rgba(255, 87, 51, 0)');

        charts.history = new Chart(historyCtx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: historyData,
                    borderColor: '#ff5733',
                    backgroundColor: gradient,
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 3,
                    pointBackgroundColor: '#ff5733',
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { maxTicksLimit: 7, font: { size: 10 } } },
                    y: { grid: { color: 'rgba(0,0,0,0.05)', drawBorder: false }, ticks: { callback: v => '$' + v.toFixed(2) } }
                }
            }
        });

        // ── Doughnut Chart ──
        if (charts.cost) charts.cost.destroy();
        const costCtx = document.getElementById('chart-cost').getContext('2d');
        charts.cost = new Chart(costCtx, {
            type: 'doughnut',
            data: {
                labels: ['Daily', 'Weekly Rest', 'Monthly Rest'],
                datasets: [{
                    data: [
                        data.daily || 2.01,
                        Math.max(0, (data.weekly || 8) - (data.daily || 2.01)),
                        Math.max(0, (data.monthly || 30) - (data.weekly || 8))
                    ],
                    backgroundColor: ['#ff5733', '#7c3aed', '#fbbf24'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '68%',
                plugins: {
                    legend: { position: 'bottom', labels: { font: { size: 11, family: 'Inter' }, usePointStyle: true } }
                }
            }
        });

        // ── Weekly Bar Chart ──
        if (charts.weekly) charts.weekly.destroy();
        const weeklyCtx = document.getElementById('chart-weekly').getContext('2d');
        const weekLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const weeklyTotal = data.weekly || 8.0;
        const weekValues = weekLabels.map((_, i) => {
            const base = weeklyTotal / 7;
            const isWeekend = i >= 5;
            const variance = (Math.random() - 0.5) * base * 0.5;
            return Math.max(0.3, base + variance + (isWeekend ? -0.2 : 0.2));
        });
        charts.weekly = new Chart(weeklyCtx, {
            type: 'bar',
            data: {
                labels: weekLabels,
                datasets: [{
                    data: weekValues,
                    backgroundColor: weekLabels.map((_, i) => i >= 5 ? '#7c3aed' : '#ff5733'),
                    borderRadius: 6,
                    borderSkipped: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false } },
                    y: { grid: { color: 'rgba(0,0,0,0.05)', drawBorder: false }, ticks: { callback: v => '$' + v.toFixed(2) } }
                }
            }
        });
    }

    function fmtDollar(n) { return '$' + (n || 0).toFixed(2); }

    function fmtTokens(n) {
        if (n >= 1_000_000) return (n / 1_000_000).toFixed(2).replace(/\.00$/, '') + 'M';
        if (n >= 1_000) return (n / 1_000).toFixed(1) + 'k';
        return n.toString();
    }

    function fmtNous(limitTpm) {
        if (!limitTpm) return '—';
        return `${Math.round(limitTpm / 1000).toLocaleString()}k/min`;
    }

    async function loadAllData() {
        try {
            const [tokenR, usageR] = await Promise.all([
                fetch('/api/tokens'),
                fetch('/api/token-usage'),
            ]);
            const t = tokenR.ok ? await tokenR.json() : {};
            const u = usageR.ok ? await usageR.json() : {};

            const or  = t.openrouter || {};

            /* ─── Cost stats ─── */
            const elDaily   = document.getElementById('stat-daily');
            const elMonthly = document.getElementById('stat-monthly');
            if (elDaily)   elDaily.textContent   = fmtDollar(or.daily    || 0);
            if (elMonthly) elMonthly.textContent = fmtDollar(or.monthly  || 0);

            /* ─── Total Burn: all provider tokens ─── */
            const all   = u.all   || {};
            let totalBurn = 0;
            Object.values(all).forEach(v => { totalBurn += (typeof v === 'object') ? (v.total || 0) : 0; });
            const elBurn = document.getElementById('stat-totalburn');
            if (elBurn) elBurn.textContent = fmtTokens(totalBurn) + ' tokens';

            /* ─── Nous limiter (tier + rate_limit_tpm) ─── */
            const nousTier = t.nous?.tier;
            const elNous   = document.getElementById('stat-nous-tpm');
            if (elNous) elNous.textContent = nousTier ? `Tier ${nousTier} · ${fmtNous(500_000)}` : '—';

            /* ─── OpenRouter remaining / limit ─── */
            const elOrL = document.getElementById('stat-or-limit');
            const elOrR = document.getElementById('stat-or-remain');
            if (elOrL) elOrL.textContent  = fmtDollar(or.limit    || 0) + (or.limit    ? ' / mo' : '');
            if (elOrR) elOrR.textContent = fmtDollar(or.remaining || 0);

            renderCharts({ daily: or.daily || 2, weekly: or.weekly || 8, monthly: or.monthly || 30 });
        } catch(e) { console.error('Token load error:', e); }
    }

    loadData = loadAllData;
    loadAllData();
    setInterval(loadAllData, 30000);
    </script>
</body>
</html>
