<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream · Activity Feed</title>
    <link rel="stylesheet" href="magazine.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    <script src="editorial.js" defer></script>
</head>
<body>
    <div class="aurora-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="noise-overlay"></div>

    <nav class="top-nav">
        <a href="/">Overview</a>
        <a href="/tokens">Intelligence</a>
        <a href="/health">Vitals</a>
        <a href="/diary">History</a>
        <a href="/tasks">Queue</a>
    </nav>

    <div class="container">
        <header style="margin-bottom: 80px;">
            <p class="uppercase-label gsap-reveal">Live Telemetry</p>
            <h1 class="gsap-reveal" style="font-size: 72px; line-height: 0.9;">Pulse <span class="italic">Stream</span></h1>
        </header>

        <div class="bento-grid">
            <div class="card col-12 gsap-reveal" style="padding: 10px;">
                <div id="activity-list" style="max-height: 600px; overflow: auto; padding: 30px;">
                    <!-- Injected -->
                </div>
            </div>
        </div>
    </div>

    <script>
        async function load() {
            try {
                const r = await fetch('/api/activity');
                const data = await r.json();
                const list = document.getElementById('activity-list');
                
                data.slice(0, 50).forEach((item, i) => {
                    const row = document.createElement('div');
                    row.style.display = 'flex';
                    row.style.gap = '20px';
                    row.style.padding = '15px 0';
                    row.style.borderBottom = '1px solid rgba(0,0,0,0.03)';
                    row.className = 'gsap-reveal';
                    
                    row.innerHTML = `
                        <div class="display-num" style="font-size: 14px; opacity: 0.3; width: 60px;">${item.time || '--:--'}</div>
                        <div style="flex: 1;">
                            <span class="uppercase-label" style="font-size: 9px; color: var(--accent-coral);">${item.agent || 'system'}</span>
                            <p style="font-size: 14px; margin-top: 4px; line-height: 1.4;">${item.message}</p>
                        </div>
                    `;
                    list.appendChild(row);
                });
                
                gsap.to(".gsap-reveal", { opacity: 1, y: 0, duration: 1, stagger: 0.02, ease: "power4.out" });
            } catch(e) {}
        }
        load();
    </script>
</body>
</html>
