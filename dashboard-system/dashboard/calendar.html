<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar · Editorial Schedule</title>
    <link rel="stylesheet" href="magazine.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="editorial.js" defer></script>
    <style>
        /* ─── Calendar Grid ─── */
        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }
        .cal-header h1 { margin: 0; font-size: 56px; line-height: 1; }
        .cal-nav {
            display: flex; gap: 12px; align-items: center;
        }
        .cal-nav button {
            background: var(--glass);
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 100px;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: var(--font-sans);
            color: var(--ink);
        }
        .cal-nav button:hover {
            border-color: rgba(0,0,0,0.15);
            background: rgba(255,255,255,0.5);
        }
        .cal-nav .month-label {
            font-size: 18px;
            font-weight: 600;
            min-width: 160px;
            text-align: center;
            font-family: var(--font-serif);
            font-style: italic;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 60px;
        }
        .cal-weekday {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.4;
            padding: 12px 0 8px;
        }
        .cal-day {
            position: relative;
            aspect-ratio: 1;
            background: var(--glass);
            border: 1px solid rgba(0,0,0,0.04);
            border-radius: 14px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            cursor: pointer;
            transition: all 0.25s ease;
            min-height: 80px;
            overflow: hidden;
        }
        .cal-day:hover {
            border-color: rgba(0,0,0,0.12);
            background: rgba(255,255,255,0.5);
        }
        .cal-day.empty {
            background: transparent;
            border-color: transparent;
            cursor: default;
        }
        .cal-day.empty:hover { border-color: transparent; background: transparent; }
        .cal-day .day-num {
            font-size: 13px;
            font-weight: 500;
            opacity: 0.5;
            line-height: 1;
        }
        .cal-day.today {
            background: var(--tint-coral);
            border-color: rgba(255,87,51,0.2);
        }
        .cal-day.today .day-num {
            opacity: 1;
            color: #ff5733;
            font-weight: 700;
        }
        .cal-day.past {
            opacity: 0.6;
        }
        .cal-day.future {
            border-style: dashed;
            border-color: rgba(0,0,0,0.08);
        }
        .cal-day .event-dots {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: auto;
            padding-top: 6px;
        }
        .cal-day .event-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }
        .cal-day:hover .event-dot { transform: scale(1.3); }
        .cal-day .event-count {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.06);
            border-radius: 100px;
            padding: 1px 7px;
            font-size: 10px;
            font-weight: 600;
            opacity: 0.5;
        }

        /* ─── Type Badges ─── */
        .type-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .type-product { background: rgba(48,209,88,0.15); color: #30d158; }
        .type-visual { background: rgba(175,82,222,0.15); color: #af52de; }
        .type-social { background: rgba(0,113,227,0.15); color: #0071e3; }
        .type-blog { background: rgba(255,159,10,0.15); color: #ff9f0a; }
        .type-telegram { background: rgba(0,184,230,0.15); color: #00b8e6; }
        .type-dev { background: rgba(90,90,90,0.15); color: #5a5a5a; }
        .type-setup { background: rgba(255,69,58,0.15); color: #ff453a; }
        .type-influencer { background: rgba(255,55,95,0.15); color: #ff375f; }
        .type-research { background: rgba(100,100,255,0.15); color: #6464ff; }

        /* ─── Timeline ─── */
        .timeline-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        .timeline-filters button {
            background: var(--glass);
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 100px;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: var(--font-sans);
            color: var(--ink);
        }
        .timeline-filters button:hover { border-color: rgba(0,0,0,0.15); }
        .timeline-filters button.active {
            background: #1d1d1f;
            color: white;
            border-color: #1d1d1f;
        }

        .timeline-day {
            margin-bottom: 32px;
        }
        .timeline-day-header {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        .timeline-day-header .date-label {
            font-size: 20px;
            font-weight: 600;
            font-family: var(--font-serif);
        }
        .timeline-day-header .date-weekday {
            font-size: 12px;
            opacity: 0.4;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .timeline-day-header .date-count {
            margin-left: auto;
            font-size: 11px;
            opacity: 0.4;
        }

        .timeline-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: var(--glass);
            border: 1px solid rgba(0,0,0,0.04);
            border-radius: 14px;
            margin-bottom: 8px;
            transition: all 0.25s ease;
            cursor: default;
        }
        .timeline-card:hover {
            border-color: rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.5);
        }
        .timeline-card .card-time {
            font-size: 12px;
            font-weight: 500;
            opacity: 0.4;
            min-width: 40px;
            font-variant-numeric: tabular-nums;
        }
        .timeline-card .card-title {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
        }
        .timeline-card .card-niche {
            font-size: 11px;
            opacity: 0.4;
            margin-right: 8px;
        }
        .timeline-card.done {
            opacity: 0.5;
        }
        .timeline-card.done .card-title {
            text-decoration: line-through;
        }
        .timeline-card .card-check {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .timeline-card .card-check:hover {
            border-color: #30d158;
        }
        .timeline-card .card-check.checked {
            background: #30d158;
            border-color: #30d158;
        }
        .timeline-card .card-check.checked::after {
            content: '✓';
            color: white;
            font-size: 12px;
            font-weight: 700;
        }

        /* ─── Stats Mini ─── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 60px;
        }
        .stat-chip {
            background: var(--glass);
            border: 1px solid rgba(0,0,0,0.04);
            border-radius: 14px;
            padding: 20px 24px;
            text-align: center;
        }
        .stat-chip .stat-value {
            font-size: 32px;
            font-weight: 700;
            font-family: var(--font-serif);
            line-height: 1;
        }
        .stat-chip .stat-label {
            font-size: 11px;
            opacity: 0.4;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 6px;
        }

        /* ─── Day Detail Modal ─── */
        .day-modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
        }
        .day-modal-overlay.open { display: flex; }
        .day-modal {
            background: #fafafa;
            border-radius: 24px;
            padding: 40px;
            max-width: 520px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0,0,0,0.15);
        }
        .day-modal h2 {
            font-size: 28px;
            font-family: var(--font-serif);
            margin: 0 0 8px;
        }
        .day-modal .modal-sub {
            font-size: 13px;
            opacity: 0.4;
            margin-bottom: 24px;
        }
        .day-modal .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        .day-modal .modal-close:hover { opacity: 0.6; }
        .day-modal .modal-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .day-modal .modal-item:last-child { border-bottom: none; }

        @media (max-width: 768px) {
            .calendar-grid { gap: 4px; }
            .cal-day { min-height: 56px; padding: 6px; }
            .cal-day .day-num { font-size: 11px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .cal-header h1 { font-size: 36px; }
            .cal-nav .month-label { min-width: 120px; font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="aurora-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="noise-overlay"></div>

    <nav class="top-nav">
        <a href="/">Overview</a>
        <a href="/tokens">Intelligence</a>
        <a href="/health">Vitals</a>
        <a href="/diary">History</a>
        <a href="/calendar" class="active">Schedule</a>
        <a href="/tasks">Queue</a>
        <a href="/pipeline">Pipeline</a>
    </nav>

    <div class="container">
        <!-- Header -->
        <header style="margin-bottom: 60px;">
            <p class="uppercase-label gsap-reveal">Editorial Calendar / Content Plan</p>
            <div class="cal-header gsap-reveal">
                <h1 style="font-size: 64px; line-height: 0.9;">Content <span class="italic">Schedule</span></h1>
            </div>
            <p class="gsap-reveal" style="opacity: 0.6; max-width: 420px; margin-top: 16px;">
                Planned content drops, product releases, and automation tasks across all niches.
            </p>
        </header>

        <!-- Stats Row -->
        <div class="stats-row gsap-reveal" id="stats-row">
            <div class="stat-chip">
                <div class="stat-value" id="stat-today">—</div>
                <div class="stat-label">Heute</div>
            </div>
            <div class="stat-chip">
                <div class="stat-value" id="stat-week">—</div>
                <div class="stat-label">Diese Woche</div>
            </div>
            <div class="stat-chip">
                <div class="stat-value" id="stat-done">—</div>
                <div class="stat-label">Erledigt</div>
            </div>
            <div class="stat-chip">
                <div class="stat-value" id="stat-upcoming">—</div>
                <div class="stat-label">Ausstehend</div>
            </div>
        </div>

        <!-- Calendar Grid -->
        <div class="card col-12 gsap-reveal" style="padding: 32px;">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
                <p class="uppercase-label" style="margin:0;">Month View</p>
                <div class="cal-nav">
                    <button id="prev-month">← Prev</button>
                    <span class="month-label" id="month-label">May 2026</span>
                    <button id="next-month">Next →</button>
                </div>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>

        <!-- Timeline Filters -->
        <div style="margin-top: 60px;">
            <h2 class="gsap-reveal" style="font-size: 36px; margin-bottom: 24px;">Timeline <span class="italic">View</span></h2>
            <div class="timeline-filters gsap-reveal" id="type-filters"></div>
            <div id="timeline-list"></div>
        </div>
    </div>

    <!-- Day Detail Modal -->
    <div class="day-modal-overlay" id="day-modal">
        <div class="day-modal">
            <button class="modal-close" id="modal-close">✕</button>
            <h2 id="modal-date">16. May</h2>
            <p class="modal-sub" id="modal-weekday">Monday</p>
            <div id="modal-items"></div>
        </div>
    </div>

    <script>
        // ─── STATE ───
        let allData = null;
        let activeFilter = 'all';
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();

        const WEEKDAYS = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
        const TYPE_COLORS = {
            'product': '#30d158', 'visual': '#af52de', 'social': '#0071e3',
            'blog': '#ff9f0a', 'telegram': '#00b8e6', 'dev': '#5a5a5a',
            'setup': '#ff453a', 'influencer': '#ff375f', 'research': '#6464ff'
        };

        // ─── LOAD DATA ───
        async function loadData() {
            try {
                const r = await fetch('/api/calendar');
                allData = await r.json();
                renderStats();
                renderMonth(currentYear, currentMonth);
                renderTimeline();
                renderFilters();
            } catch(e) { console.error('Calendar load error', e); }
        }

        // ─── STATS ───
        function renderStats() {
            const all = allData.items || [];
            let todayCount = 0, weekCount = 0, doneCount = 0, upcomingCount = 0;
            const todayStr = allData.today;

            all.forEach(day => {
                day.items.forEach(item => {
                    if (day.is_today) todayCount++;
                    if (item.done) doneCount++;
                    else upcomingCount++;
                    // this week
                    const d = new Date(day.date + 'T12:00:00');
                    const now = new Date();
                    const weekStart = new Date(now);
                    weekStart.setDate(now.getDate() - now.getDay() + 1);
                    weekStart.setHours(0,0,0,0);
                    const weekEnd = new Date(weekStart);
                    weekEnd.setDate(weekStart.getDate() + 6);
                    if (d >= weekStart && d <= weekEnd) weekCount++;
                });
            });

            document.getElementById('stat-today').textContent = todayCount;
            document.getElementById('stat-week').textContent = weekCount;
            document.getElementById('stat-done').textContent = doneCount;
            document.getElementById('stat-upcoming').textContent = upcomingCount;
        }

        // ─── MONTH GRID ───
        function renderMonth(year, month) {
            const grid = document.getElementById('calendar-grid');
            const monthNames = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
            document.getElementById('month-label').textContent = monthNames[month] + ' ' + year;

            const firstDay = new Date(year, month, 1);
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const startDow = (firstDay.getDay() + 6) % 7; // 0=Monday
            const todayStr = new Date().toISOString().slice(0,10);

            // Build a lookup: date -> day group
            const lookup = {};
            (allData.items || []).forEach(d => { lookup[d.date] = d; });

            let html = '';
            // Weekday headers
            WEEKDAYS.forEach(w => {
                html += `<div class="cal-weekday">${w}</div>`;
            });

            // Empty cells before first day
            for (let i = 0; i < startDow; i++) {
                html += `<div class="cal-day empty"></div>`;
            }

            // Day cells
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dayData = lookup[dateStr];
                const isToday = dateStr === todayStr;
                const isPast = dateStr < todayStr;
                const isFuture = dateStr > todayStr;
                const itemCount = dayData ? dayData.items.length : 0;

                let classes = 'cal-day';
                if (isToday) classes += ' today';
                if (isPast && !isToday) classes += ' past';
                if (isFuture) classes += ' future';

                let dotsHtml = '';
                if (dayData) {
                    const types = [...new Set(dayData.items.map(i => i.type))];
                    dotsHtml = '<div class="event-dots">';
                    types.slice(0, 5).forEach(t => {
                        dotsHtml += `<div class="event-dot" style="background:${TYPE_COLORS[t] || '#888'}"></div>`;
                    });
                    dotsHtml += '</div>';
                }

                html += `<div class="${classes}" data-date="${dateStr}">
                    <span class="day-num">${d}</span>
                    ${itemCount > 0 ? `<span class="event-count">${itemCount}</span>` : ''}
                    ${dotsHtml}
                </div>`;
            }

            grid.innerHTML = html;

            // Click handlers
            grid.querySelectorAll('.cal-day:not(.empty)').forEach(el => {
                el.addEventListener('click', () => openDayModal(el.dataset.date));
            });

            gsap.fromTo(grid.querySelectorAll('.cal-day:not(.empty)'),
                { opacity: 0, y: 12 },
                { opacity: 1, y: 0, duration: 0.5, stagger: 0.008, ease: 'power3.out' }
            );
        }

        // ─── TIMELINE ───
        function renderTimeline() {
            const list = document.getElementById('timeline-list');
            const items = allData.items || [];

            let html = '';
            items.forEach((day, di) => {
                let filtered = day.items;
                if (activeFilter !== 'all') {
                    filtered = day.items.filter(i => i.type === activeFilter);
                }
                if (filtered.length === 0) return;

                html += `<div class="timeline-day gsap-reveal">
                    <div class="timeline-day-header">
                        <span class="date-label">${day.day}. ${allData.current_month_name.split(' ')[0]}</span>
                        <span class="date-weekday">${day.weekday}</span>
                        ${day.is_today ? '<span class="pill pill--status" style="font-size:9px;">Heute</span>' : ''}
                        <span class="date-count">${filtered.length} item${filtered.length > 1 ? 's' : ''}</span>
                    </div>`;

                filtered.forEach(item => {
                    const doneClass = item.done ? 'done' : '';
                    const checkedClass = item.done ? 'checked' : '';
                    const timeStr = item.time || '—';
                    html += `<div class="timeline-card ${doneClass}">
                        <div class="card-check ${checkedClass}" onclick="this.classList.toggle('checked');this.parentElement.classList.toggle('done');"></div>
                        <span class="card-time">${timeStr}</span>
                        <span class="type-badge type-${item.type}">${item.type}</span>
                        <span class="card-title">${item.title}</span>
                        ${item.niche && item.niche !== 'Alle' ? `<span class="card-niche">${item.niche}</span>` : ''}
                    </div>`;
                });

                html += '</div>';
            });

            list.innerHTML = html || '<div class="card" style="padding:32px;text-align:center;opacity:0.5;">No items match this filter.</div>';

            gsap.fromTo(list.querySelectorAll('.timeline-day'),
                { opacity: 0, y: 20 },
                { opacity: 1, y: 0, duration: 0.6, stagger: 0.08, ease: 'power3.out' }
            );
        }

        // ─── FILTERS ───
        function renderFilters() {
            const container = document.getElementById('type-filters');
            const types = ['all', ...new Set((allData.items || []).flatMap(d => d.items.map(i => i.type)))];

            container.innerHTML = types.map(t => `
                <button class="${t === activeFilter ? 'active' : ''}" data-type="${t}">
                    ${t === 'all' ? 'All' : t.charAt(0).toUpperCase() + t.slice(1)}
                </button>
            `).join('');

            container.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => {
                    container.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeFilter = btn.dataset.type;
                    renderTimeline();
                });
            });
        }

        // ─── DAY MODAL ───
        function openDayModal(dateStr) {
            const day = (allData.items || []).find(d => d.date === dateStr);
            if (!day) return;

            const modal = document.getElementById('day-modal');
            document.getElementById('modal-date').textContent = `${day.day}. ${allData.current_month_name.split(' ')[0]}`;
            document.getElementById('modal-weekday').textContent = day.weekday;

            const itemsDiv = document.getElementById('modal-items');
            itemsDiv.innerHTML = day.items.map(item => `
                <div class="modal-item">
                    <div class="card-check ${item.done ? 'checked' : ''}" onclick="this.classList.toggle('checked');"></div>
                    <span class="type-badge type-${item.type}">${item.type}</span>
                    <span style="flex:1;font-size:14px;">${item.title}</span>
                    ${item.time ? `<span style="font-size:11px;opacity:0.4;">${item.time}</span>` : ''}
                </div>
            `).join('');

            modal.classList.add('open');
        }

        document.getElementById('modal-close').addEventListener('click', () => {
            document.getElementById('day-modal').classList.remove('open');
        });
        document.getElementById('day-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                document.getElementById('day-modal').classList.remove('open');
            }
        });

        // ─── MONTH NAV ───
        document.getElementById('prev-month').addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderMonth(currentYear, currentMonth);
        });
        document.getElementById('next-month').addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderMonth(currentYear, currentMonth);
        });

        // ─── INIT ───
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        // GSAP initial reveals (for elements already in DOM)
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                gsap.to(".gsap-reveal", { opacity: 1, y: 0, duration: 0.8, stagger: 0.04, ease: "power4.out" });
            }, 100);
        });
    </script>
</body>
</html>
